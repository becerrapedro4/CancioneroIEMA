<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control - IEMA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif; background:#0D0D0D; color:#F0EDE8; min-height:100vh}
header{background:#161616; padding:15px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #2A2A2A}
h1{font-size:24px}

.container{padding:20px; max-width:1200px; margin:auto}

.search-box{width:100%; padding:14px; background:#1E1E1E; border:1px solid #2A2A2A; border-radius:12px; color:white; margin-bottom:20px}

.song-list{max-height:70vh; overflow-y:auto}
.song-item{
  padding:16px; background:#161616; margin-bottom:8px; border-radius:12px;
  border:1px solid #2A2A2A; cursor:pointer; transition:all .2s;
}
.song-item:hover{border-color:#F5A623}

.controls-bar{
  position:fixed; bottom:0; left:0; right:0; background:#161616;
  padding:15px; display:flex; gap:10px; border-top:1px solid #2A2A2A;
}
.btn{
  flex:1; padding:16px; border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer;
}
.btn-send{background:#F5A623; color:black}
.btn-clear{background:#E05252; color:white}
</style>
</head>
<body>

<header>
  <h1>🎛️ Control IEMA</h1>
  <button onclick="exportToHolyrics()" style="padding:8px 16px; background:#4CAF7D; color:white; border:none; border-radius:8px;">Exportar Holyrics</button>
</header>

<div class="container">
  <input type="text" class="search-box" id="search" placeholder="Buscar canción..." onkeyup="filterSongs()">
  
  <div class="song-list" id="song-list">
    <!-- Se llena con JavaScript -->
  </div>
</div>

<div class="controls-bar">
  <button class="btn btn-clear" onclick="clearPresentation()">Limpiar Pantalla</button>
  <button class="btn btn-send" onclick="sendToViewer()">Enviar a Proyector</button>
</div>

<script>
// Ejemplo de canciones (se cargará desde canciones.json en versión final)
let songs = [];

async function loadSongs() {
  try {
    const res = await fetch('canciones.json');
    songs = await res.json();
    renderSongs(songs);
  } catch(e) {
    console.error("Error cargando canciones", e);
  }
}

function renderSongs(filteredSongs) {
  const container = document.getElementById("song-list");
  container.innerHTML = "";
  
  filteredSongs.forEach(song => {
    const div = document.createElement("div");
    div.className = "song-item";
    div.innerHTML = `<strong>${song.title}</strong>`;
    div.onclick = () => selectSong(song);
    container.appendChild(div);
  });
}

function filterSongs() {
  const term = document.getElementById("search").value.toLowerCase();
  const filtered = songs.filter(s => s.title.toLowerCase().includes(term));
  renderSongs(filtered);
}

function selectSong(song) {
  console.log("Canción seleccionada:", song.title);
  // Aquí guardarías en Firebase para que el viewer lo muestre
}

function clearPresentation() {
  if(confirm("¿Limpiar la pantalla del proyector?")) {
    alert("Pantalla limpiada");
  }
}

function sendToViewer() {
  alert("Enviado al proyector (simulado)");
}

// Exportar a Holyrics
function exportToHolysics() {
  const data = {
    version: "1.0",
    songs: songs.map(s => ({
      title: s.title,
      lyrics: s.lyrics?.full_text || "",
      key: s.key || "",
      bpm: s.bpm || 0
    }))
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "Cancionero_IEMA_Holyrics.json";
  a.click();
}

window.onload = loadSongs;
</script>
</body>
</html>
