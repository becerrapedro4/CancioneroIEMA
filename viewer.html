<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff}

.orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:drift 18s ease-in-out infinite}
.orb1{width:70vw;height:70vw;background:#F5A623;opacity:.18;top:-15%;left:-15%;animation-delay:0s}
.orb2{width:50vw;height:50vw;background:#F5A623;opacity:.10;bottom:-10%;right:-10%;animation-delay:-7s}
.orb3{width:35vw;height:35vw;background:#fff;opacity:.04;top:40%;left:55%;animation-delay:-13s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(4%,6%) scale(1.05)}66%{transform:translate(-3%,3%) scale(.97)}}

/* Controles superiores (ocultos en fullscreen pero accesibles con hover) */
.controls{position:fixed;top:0;left:0;right:0;z-index:10;padding:12px 16px;display:flex;align-items:center;gap:10px;opacity:0;transition:opacity .3s;background:linear-gradient(rgba(0,0,0,.7),transparent)}
.controls:hover,.controls.show{opacity:1}
.ctrl-btn{padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);color:#fff;font-family:system-ui,-apple-system,sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;backdrop-filter:blur(8px);transition:all .2s}
.ctrl-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.4)}
.ctrl-btn.active{background:rgba(245,166,35,.25);border-color:rgba(245,166,35,.6);color:#F5A623}

.stage{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8vw;text-align:center;transition:opacity .4s}
.stage.hidden{opacity:0;pointer-events:none}

.lyric{
  font-family:system-ui,-apple-system,sans-serif;
  font-size:clamp(28px,5.5vw,88px);
  font-weight:600;
  line-height:1.45;
  text-transform:uppercase;
  letter-spacing:.02em;
  white-space:pre-wrap;
  max-width:90vw;
}
.lyric.out{opacity:0;transform:translateY(14px);transition:opacity .2s,transform .2s}
.lyric.in{animation:lyricIn .35s ease forwards}
@keyframes lyricIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}

/* Cita y versión abajo */
.ref-info{
  position:absolute;bottom:6vh;left:50%;transform:translateX(-50%);
  font-family:system-ui,-apple-system,sans-serif;
  font-size:clamp(14px,2.5vw,28px);
  font-weight:400;
  color:rgba(255,255,255,.55);
  letter-spacing:.04em;
  text-align:center;
  max-width:80vw;
  transition:opacity .3s;
}
.ref-info.hidden{opacity:0}
</style>
</head>
<body>

<div class="orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- Controles -->
<div class="controls" id="controls">
  <button class="ctrl-btn active" id="btn-ref" title="Mostrar/ocultar cita">📖 Cita</button>
</div>

<div class="stage hidden" id="stage">
  <div class="lyric" id="lyric"></div>
  <div class="ref-info" id="ref-info"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDcstZpX0ji9HAdK9POboYQPTMcc6utC1E",
  authDomain:"browser-songs.firebaseapp.com",
  databaseURL:"https://browser-songs-default-rtdb.firebaseio.com",
  projectId:"browser-songs"
});
const db=firebase.database();

const params=new URLSearchParams(location.search);
let room=params.get("room")||localStorage.getItem("pres_room")||"";
if(!room){
  room=(prompt("Nombre de la sala:","iglesia")||"iglesia").trim().replace(/[^a-zA-Z0-9_-]/g,"_");
}
localStorage.setItem("pres_room",room);

const stage=document.getElementById("stage");
const lyricEl=document.getElementById("lyric");
const refInfo=document.getElementById("ref-info");
const btnRef=document.getElementById("btn-ref");
const controls=document.getElementById("controls");

let showRef=true; // toggle local, se sincroniza con lo que venga de Firebase

/* Toggle cita */
btnRef.addEventListener("click",()=>{
  showRef=!showRef;
  btnRef.classList.toggle("active",showRef);
  updateRefVisibility();
});

function updateRefVisibility(){
  if(showRef){
    refInfo.classList.remove("hidden");
  }else{
    refInfo.classList.add("hidden");
  }
}

/* Mostrar controls al mover el mouse (escritorio) y ocultar después */
let hideTimer;
document.addEventListener("mousemove",()=>{
  controls.classList.add("show");
  clearTimeout(hideTimer);
  hideTimer=setTimeout(()=>controls.classList.remove("show"),2500);
});

/* También mostrar al tocar (mobile) */
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".ctrl-btn")){
    controls.classList.add("show");
    clearTimeout(hideTimer);
    hideTimer=setTimeout(()=>controls.classList.remove("show"),2500);
  }
  // Fullscreen al primer toque
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  }
});

function showLyric(data){
  if(!data||data.stop||data.blank){
    stage.classList.add("hidden");
    return;
  }
  
  // Cambiar texto principal
  lyricEl.classList.remove("in");
  lyricEl.classList.add("out");
  
  setTimeout(()=>{
    lyricEl.textContent=data.estrofa||"";
    lyricEl.classList.remove("out");
    void lyricEl.offsetWidth;
    lyricEl.classList.add("in");
    stage.classList.remove("hidden");
  },200);

  // Armar cita: "Mateo 5:3 (NVI)" o similar
  const ref=data.reference||data.titulo||"";
  const ver=data.version||"";
  
  if(ref){
    refInfo.textContent=ver?`${ref} (${ver})`:ref;
  }else{
    refInfo.textContent="";
  }
  
  // Sincronizar toggle si viene showRef
  if(typeof data.showRef!=="undefined"){
    showRef=data.showRef;
    btnRef.classList.toggle("active",showRef);
  }
  updateRefVisibility();
}

db.ref(`rooms/${room}/currentSong`).on("value",snap=>showLyric(snap.val()));

// Wake lock para evitar que la pantalla se apague
if("wakeLock" in navigator){
  const lock=()=>navigator.wakeLock.request("screen").catch(()=>{});
  lock();
  document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible")lock();});
}
</script>
</body>
</html>
