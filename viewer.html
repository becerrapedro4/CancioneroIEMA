<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff}

.orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:drift 18s ease-in-out infinite}
.orb1{width:70vw;height:70vw;background:#F5A623;opacity:.18;top:-15%;left:-15%;animation-delay:0s}
.orb2{width:50vw;height:50vw;background:#F5A623;opacity:.10;bottom:-10%;right:-10%;animation-delay:-7s}
.orb3{width:35vw;height:35vw;background:#fff;opacity:.04;top:40%;left:55%;animation-delay:-13s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(4%,6%) scale(1.05)}66%{transform:translate(-3%,3%) scale(.97)}}

.stage{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6vh 6vw;text-align:center;transition:opacity .4s}
.stage.hidden{opacity:0;pointer-events:none}

/* Título (solo canciones, no Biblia) */
.song-title{
  font-family:system-ui,-apple-system,sans-serif;
  font-weight:700;
  line-height:1.1;
  text-transform:uppercase;
  letter-spacing:-.02em;
  margin-bottom:3vh;
  opacity:.7;
  transition:font-size .3s;
}
.song-title.hidden{display:none}

/* Letra / versículo */
.lyric{
  font-family:system-ui,-apple-system,sans-serif;
  font-weight:600;
  line-height:1.4;
  text-transform:uppercase;
  letter-spacing:.02em;
  white-space:pre-wrap;
  max-width:94vw;
  transition:font-size .3s,opacity .2s,transform .2s;
}
.lyric.out{opacity:0;transform:translateY(14px)}
.lyric.in{animation:lyricIn .35s ease forwards}
@keyframes lyricIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}

/* Cita bíblica */
.ref-info{
  position:absolute;bottom:5vh;left:50%;transform:translateX(-50%);
  font-family:system-ui,-apple-system,sans-serif;
  font-weight:400;
  color:rgba(255,255,255,.45);
  letter-spacing:.04em;
  text-align:center;
  max-width:80vw;
  transition:opacity .3s,font-size .3s;
}
.ref-info.hidden{opacity:0}
</style>
</head>
<body>

<div class="orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="stage hidden" id="stage">
  <div class="song-title hidden" id="song-title"></div>
  <div class="lyric" id="lyric"></div>
  <div class="ref-info hidden" id="ref-info"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDcstZpX0ji9HAdK9POboYQPTMcc6utC1E",
  authDomain:"browser-songs.firebaseapp.com",
  databaseURL:"https://browser-songs-default-rtdb.firebaseio.com",
  projectId:"browser-songs"
});
const db=firebase.database();

const params=new URLSearchParams(location.search);
let room=params.get("room")||localStorage.getItem("pres_room")||"";
if(!room){
  room=(prompt("Nombre de la sala:","iglesia")||"iglesia").trim().replace(/[^a-zA-Z0-9_-]/g,"_");
}
localStorage.setItem("pres_room",room);

const stage=document.getElementById("stage");
const lyricEl=document.getElementById("lyric");
const titleEl=document.getElementById("song-title");
const refInfo=document.getElementById("ref-info");

/* ── Calcular tamaño de fuente dinámico ── */
function calcFontSize(text, isTitle){
  const len=(text||"").length;
  const vw=window.innerWidth/100;
  const vh=window.innerHeight/100;
  
  if(isTitle){
    // Título: más chico que la letra
    if(len<15)return Math.min(5*vw,6*vh)+"px";
    if(len<30)return Math.min(3.5*vw,4.5*vh)+"px";
    return Math.min(2.5*vw,3.5*vh)+"px";
  }else{
    // Letra: se achica si es muy larga
    if(len<80)return Math.min(5.5*vw,7*vh)+"px";
    if(len<200)return Math.min(4*vw,5.5*vh)+"px";
    if(len<400)return Math.min(3*vw,4*vh)+"px";
    if(len<700)return Math.min(2.3*vw,3.3*vh)+"px";
    return Math.min(1.8*vw,2.5*vh)+"px";
  }
}

function showLyric(data){
  if(!data||data.stop||data.blank){
    stage.classList.add("hidden");
    return;
  }
  
  const isBible=data.type==="bible";
  const showTitle=data.showTitle!==false&&!!data.titulo&&!isBible;
  
  // Título
  if(showTitle){
    titleEl.textContent=data.titulo;
    titleEl.style.fontSize=calcFontSize(data.titulo,false);
    titleEl.classList.remove("hidden");
  }else{
    titleEl.classList.add("hidden");
  }
  
  // Letra
  lyricEl.classList.remove("in");
  lyricEl.classList.add("out");
  
  setTimeout(()=>{
    lyricEl.textContent=data.estrofa||"";
    lyricEl.style.fontSize=calcFontSize(data.estrofa||"",false);
    lyricEl.classList.remove("out");
    void lyricEl.offsetWidth;
    lyricEl.classList.add("in");
    stage.classList.remove("hidden");
  },200);

  // Cita bíblica
  const ref=data.reference||"";
  const ver=data.version||"";
  const showRef=data.showRef!==false;
  
  if(ref&&showRef){
    refInfo.textContent=ver?`${ref} · ${ver}`:ref;
    refInfo.style.fontSize=Math.min(2.5*window.innerWidth/100,3.5*window.innerHeight/100)+"px";
    refInfo.classList.remove("hidden");
  }else{
    refInfo.classList.add("hidden");
  }
}

db.ref(`rooms/${room}/currentSong`).on("value",snap=>showLyric(snap.val()));

// Recalcular al cambiar tamaño de ventana
window.addEventListener("resize",()=>{
  const currentText=lyricEl.textContent;
  if(currentText){
    lyricEl.style.fontSize=calcFontSize(currentText,false);
    if(!titleEl.classList.contains("hidden")){
      titleEl.style.fontSize=calcFontSize(titleEl.textContent,true);
    }
  }
});

// Wake lock
if("wakeLock" in navigator){
  const lock=()=>navigator.wakeLock.request("screen").catch(()=>{});
  lock();
  document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible")lock();});
}
</script>
</body>
</html>
