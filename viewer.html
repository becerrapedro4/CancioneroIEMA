<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer — Cancionero IEMA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--tx:#fff;--accent:#F5A623;--dur:.45s}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Sans',system-ui,sans-serif}

/* ── ORBS (fondo animado) ── */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;transition:opacity .6s}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.22;animation:drift 18s ease-in-out infinite}
.orb1{width:70vw;height:70vw;background:var(--accent);top:-15%;left:-15%;animation-delay:0s}
.orb2{width:50vw;height:50vw;background:var(--accent);bottom:-10%;right:-10%;animation-delay:-7s;opacity:.14}
.orb3{width:35vw;height:35vw;background:#fff;top:40%;left:55%;animation-delay:-13s;opacity:.05}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(4%,6%) scale(1.05)}66%{transform:translate(-3%,3%) scale(.97)}}

/* ── MAIN STAGE ── */
.stage{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8vw;text-align:center;transition:opacity var(--dur)}
.stage.hidden{opacity:0;pointer-events:none}

.song-label{font-size:clamp(10px,1.5vw,16px);letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2.5vh;transition:opacity var(--dur)}
.stanza-label{font-size:clamp(9px,1.2vw,14px);letter-spacing:3px;text-transform:uppercase;color:var(--accent);opacity:.7;margin-bottom:3vh;min-height:1em;transition:opacity var(--dur)}
.lyric{font-size:clamp(28px,5.5vw,80px);font-weight:600;line-height:1.45;text-transform:uppercase;letter-spacing:.02em;white-space:pre-wrap;max-width:90vw;transition:opacity var(--dur),transform var(--dur)}

/* stanza transition */
.lyric.fade-out{opacity:0;transform:translateY(12px)}
.lyric.fade-in{animation:lyricIn var(--dur) ease forwards}
@keyframes lyricIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}

/* progress dots */
.progress{position:fixed;bottom:4vh;left:50%;transform:translateX(-50%);z-index:2;display:flex;gap:8px;opacity:.5}
.pdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .3s,transform .3s}
.pdot.active{background:var(--accent);transform:scale(1.5)}

/* ── WAITING / STOP screen ── */
.waiting{position:fixed;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;opacity:0;pointer-events:none;transition:opacity .6s}
.waiting.visible{opacity:1;pointer-events:auto}
.waiting-logo{font-size:clamp(28px,5vw,52px);font-weight:700;letter-spacing:-1px;color:rgba(255,255,255,.15)}
.waiting-label{font-size:clamp(10px,1.5vw,14px);letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.2);animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

/* ── ROOM badge ── */
.room-badge{position:fixed;top:20px;right:24px;z-index:10;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:999px;padding:5px 12px;backdrop-filter:blur(8px)}

/* ── FULLSCREEN hint ── */
.fs-hint{position:fixed;bottom:20px;right:24px;z-index:10;font-size:11px;color:rgba(255,255,255,.15);cursor:pointer;letter-spacing:1px;transition:color .2s}
.fs-hint:hover{color:rgba(255,255,255,.5)}
</style>
</head>
<body>

<div class="orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="room-badge" id="room-badge"></div>

<div class="stage" id="stage">
  <div class="song-label" id="song-label"></div>
  <div class="stanza-label" id="stanza-label"></div>
  <div class="lyric" id="lyric"></div>
</div>

<div class="progress" id="progress"></div>

<div class="waiting visible" id="waiting">
  <div class="waiting-logo">CANCIONERO IEMA</div>
  <div class="waiting-label">Esperando presentación…</div>
</div>

<div class="fs-hint" id="fs-hint" title="Pantalla completa">⛶ Fullscreen</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const FB_CONFIG={
  apiKey:"AIzaSyDcstZpX0ji9HAdK9POboYQPTMcc6utC1E",
  authDomain:"browser-songs.firebaseapp.com",
  databaseURL:"https://browser-songs-default-rtdb.firebaseio.com",
  projectId:"browser-songs"
};

firebase.initializeApp(FB_CONFIG);
const db=firebase.database();

// ── get room from URL ──
const params=new URLSearchParams(location.search);
let room=params.get("room")||(localStorage.getItem("pres_room")||"");

if(!room){
  room=prompt("Nombre de la sala:","iglesia")||"iglesia";
  room=room.trim().replace(/[^a-zA-Z0-9_-]/g,"_");
}
localStorage.setItem("pres_room",room);
document.getElementById("room-badge").textContent="⬤ "+room;

// ── state ──
let currentId=null;

function setAccent(hex){
  // change orb colors to match presenter choice if desired
}

function showLyric(data){
  if(!data||data.stop){
    // stop / offline
    document.getElementById("waiting").classList.add("visible");
    document.getElementById("stage").classList.add("hidden");
    document.getElementById("progress").innerHTML="";
    currentId=null;
    return;
  }

  if(data.blank){
    // blank screen
    document.getElementById("waiting").classList.remove("visible");
    document.getElementById("stage").classList.add("hidden");
    document.getElementById("progress").innerHTML="";
    return;
  }

  document.getElementById("waiting").classList.remove("visible");

  // animate lyric change
  const lyricEl=document.getElementById("lyric");
  lyricEl.classList.add("fade-out");

  setTimeout(()=>{
    document.getElementById("song-label").textContent=data.titulo||"";
    document.getElementById("stanza-label").textContent=data.label||"";
    lyricEl.textContent=data.estrofa||"";
    lyricEl.classList.remove("fade-out","fade-in");
    // force reflow
    void lyricEl.offsetWidth;
    lyricEl.classList.add("fade-in");
    document.getElementById("stage").classList.remove("hidden");

    // progress dots
    const prog=document.getElementById("progress");
    if(data.total>1){
      prog.innerHTML=Array.from({length:data.total},(_,i)=>
        `<div class="pdot${i===data.idx?" active":""}"></div>`
      ).join("");
    } else {
      prog.innerHTML="";
    }
  },200);

  currentId=data.id;
}

// ── listen ──
db.ref(`rooms/${room}/currentSong`).on("value",snap=>{
  showLyric(snap.val());
});

// ── fullscreen ──
document.getElementById("fs-hint").addEventListener("click",()=>{
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
    document.getElementById("fs-hint").textContent="✕ Salir";
  } else {
    document.exitFullscreen();
    document.getElementById("fs-hint").textContent="⛶ Fullscreen";
  }
});
document.addEventListener("fullscreenchange",()=>{
  if(!document.fullscreenElement)
    document.getElementById("fs-hint").textContent="⛶ Fullscreen";
});

// ── prevent sleep on mobile ──
let wakeLock=null;
if("wakeLock" in navigator){
  navigator.wakeLock.request("screen").then(wl=>{wakeLock=wl;}).catch(()=>{});
  document.addEventListener("visibilitychange",()=>{
    if(document.visibilityState==="visible"&&!wakeLock)
      navigator.wakeLock.request("screen").then(wl=>{wakeLock=wl;}).catch(()=>{});
  });
}
</script>
</body>
</html>
