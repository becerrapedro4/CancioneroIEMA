<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancionero IEMA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:#0D0D0D; color:#F0EDE8;
  min-height:100vh; padding-bottom:80px;
}
header{
  background:#161616; padding:20px; text-align:center; border-bottom:1px solid #2A2A2A;
}
h1{font-size:28px; margin-bottom:8px}
.subtitle{color:#F5A623; font-size:15px}

.menu{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px;
  padding:20px; max-width:1200px; margin:0 auto;
}
.card{
  background:#161616; border:1px solid #2A2A2A; border-radius:16px;
  padding:24px; cursor:pointer; transition:all .2s;
}
.card:hover{
  transform:translateY(-8px); border-color:#F5A623; box-shadow:0 10px 30px rgba(245,166,35,.15);
}
.card h2{font-size:22px; margin-bottom:8px; color:#F5A623}
.card p{color:#A8A39A; line-height:1.5}

.bottom-bar{
  position:fixed; bottom:0; left:0; right:0;
  background:#161616; padding:12px; display:flex; gap:10px; border-top:1px solid #2A2A2A;
}
.btn{
  flex:1; padding:16px; border-radius:12px; text-align:center; font-weight:600;
  text-decoration:none; color:white;
}
.btn-biblia{background:#4CAF7D}
.btn-control{background:#5B9CF6}
</style>
</head>
<body>

<header>
  <h1>Cancionero IEMA</h1>
  <p class="subtitle">Adoración • Biblia • Proyección</p>
</header>

<div class="menu">
  <div class="card" onclick="location.href='biblia.html'">
    <h2>📖 Biblia</h2>
    <p>8 versiones completas. Buscador avanzado y modo proyección.</p>
  </div>
  
  <div class="card" onclick="location.href='viewer.html'">
    <h2>🎤 Viewer</h2>
    <p>Modo proyector para canciones y versículos.</p>
  </div>
  
  <div class="card" onclick="location.href='control.html'">
    <h2>🎛️ Control</h2>
    <p>Panel de control para gestionar la presentación en vivo.</p>
  </div>
</div>

<div class="bottom-bar">
  <a href="biblia.html" class="btn btn-biblia">📖 Abrir Biblia</a>
  <a href="control.html" class="btn btn-control">🎛️ Abrir Control</a>
</div>

</body>
</html>
