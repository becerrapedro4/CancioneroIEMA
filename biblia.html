<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Biblia - IEMA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0D;--surface:#161616;--surface2:#1E1E1E;
  --accent:#F5A623;--text:#F0EDE8;--muted:#6B6560;
  --border:#2A2A2A;--green:#4CAF7D;--red:#E05252;--blue:#5B9CF6;
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}

.topbar{position:sticky;top:0;z-index:50;background:rgba(13,13,13,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:17px;cursor:pointer;text-decoration:none}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}

.search-wrap{padding:12px 16px 8px}
.search-inp{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none}

.nav-row{padding:0 16px 12px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.nav-sel{flex:1;min-width:160px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px}

.controls{padding:0 16px 12px;display:flex;gap:16px;font-size:13px;flex-wrap:wrap}
label{cursor:pointer;display:flex;align-items:center;gap:6px}

button#end-pres{padding:10px 18px;background:#E05252;color:white;border:none;border-radius:10px;font-weight:600;cursor:pointer}

.verse-list{padding:6px 0 100px}
.verse-item{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer}
.verse-item:hover{background:var(--surface)}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="index.html">←</a>
  <div class="topbar-title">Biblia</div>
</div>

<div class="search-wrap">
  <input class="search-inp" id="search-inp" type="search" placeholder="Buscar versículo...">
</div>

<div class="nav-row">
  <select id="version-sel" class="nav-sel"></select>
  <button id="end-pres" onclick="endPresentation()">⬛ Terminar Presentación</button>
</div>

<div class="controls">
  <label><input type="checkbox" id="show-cite" checked onchange="saveSettings()"> Mostrar cita debajo</label>
  <label><input type="checkbox" id="show-version" onchange="saveSettings()"> Mostrar versión</label>
</div>

<div id="main-content" class="verse-list"></div>

<script>
// ==================== CONFIG ====================
let currentVersion = "Reina-Valera 1960";

// ==================== FUNCIONES ====================
function endPresentation() {
  if(confirm("¿Terminar la presentación actual?")) {
    // Aquí puedes agregar lógica de Firebase si la usas
    alert("Presentación terminada");
  }
}

function saveSettings() {
  localStorage.setItem("bible_show_cite", document.getElementById("show-cite").checked);
  localStorage.setItem("bible_show_version", document.getElementById("show-version").checked);
}

// Cargar versiones
async function loadVersions() {
  const select = document.getElementById("version-sel");
  const versions = [
    "Reina-Valera 1960", "Nueva Versión Internacional", "Dios Habla Hoy",
    "La Biblia de Las Americas", "Nueva Traducción Viviente",
    "Traducción en Lenguaje Actual", "Palabra de Dios para Todos", "RVC"
  ];
  
  select.innerHTML = "";
  versions.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    if(v === currentVersion) opt.selected = true;
    select.appendChild(opt);
  });

  select.onchange = () => {
    currentVersion = select.value;
    // Aquí cargarías el XML correspondiente
    console.log("Versión cambiada a:", currentVersion);
  };
}

// Inicializar
window.onload = () => {
  loadVersions();
  document.getElementById("show-cite").checked = localStorage.getItem("bible_show_cite") !== "false";
  document.getElementById("show-version").checked = localStorage.getItem("bible_show_version") === "true";
};
</script>
</body>
</html>
